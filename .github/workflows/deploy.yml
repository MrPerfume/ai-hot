name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
  workflow_run:
    workflows: ["Daily AI Data Aggregation"]
    types: [completed]
  workflow_dispatch:

env:
  AI_HOT_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: ai-hot-pages-deploy
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Refresh meta timestamp (Asia/Shanghai)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo

          meta_path = Path('data/meta.json')
          meta = {}
          if meta_path.exists():
              meta = json.loads(meta_path.read_text(encoding='utf-8'))
          meta['last_update'] = datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y-%m-%d %H:%M:%S')
          meta.setdefault('version', '3.0')
          results = meta.get('results') or {}
          results['网站部署'] = f"✅ GitHub Pages 发布 {meta['last_update']}"
          meta['results'] = results
          meta_path.write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Sync data to Hugo
        run: cp -r data/* site/data/

      - name: Refresh static URLs and reports
        run: |
          python scripts/generate_sitemap.py
          python scripts/generate_daily_report_html.py

      - name: Build
        working-directory: site
        run: hugo --minify --baseURL "${AI_HOT_SITE_URL}/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/public
