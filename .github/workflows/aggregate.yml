name: Daily AI Data Aggregation

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  AI_HOT_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run Regression Tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run Lightweight Aggregator
        run: python scripts/light_daily_aggregate.py

      - name: Run Regression Tests After Aggregation
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run Quality Gate
        run: python scripts/quality_gate.py

      - name: Verify Daily HTML Report
        run: python scripts/generate_daily_report_html.py

      - name: Commit & Push
        run: |
          git config user.name "AI热榜 Bot"
          git config user.email "bot@airebang.com"
          git add data/ site/data/ README.md site/content/news/ site/content/tools/ site/static/ scripts/ tests/ .github/workflows/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📰 [auto] AI日报 $(date +'%Y-%m-%d')"
            git push
          fi
